<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b18" />
  <title>Carrossel 3D</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b18;
      --panel: rgba(18, 24, 48, 0.72);
      --text: #f7f8ff;
      --muted: #aeb7d3;
      --accent: #93a7ff;
      --signature-bg: rgba(19, 25, 50, .72);
      --signature-text: #cbd3f2;
      --signature-border: rgba(174, 183, 211, .18);
      --card-w: clamp(150px, 24vw, 224px);
      --radius: 24px;
      --ease: cubic-bezier(.2, .75, .18, 1);
      --card-motion-duration: 720ms;
      --card-opacity-duration: 520ms;
      --card-effect-duration: 520ms;
      --card-shadow-duration: 650ms;
      --control-transition-duration: 180ms;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; background: var(--bg); }

    body {
      min-height: 100svh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 8%, rgba(96, 116, 255, .24), transparent 34rem),
        radial-gradient(circle at 12% 86%, rgba(35, 207, 170, .12), transparent 27rem),
        var(--bg);
    }

    button { font: inherit; }

    .demo {
      display: grid;
      flex: 1;
      align-content: center;
      width: min(1180px, 100%);
      padding: clamp(18px, 4vw, 52px) 0;
    }

    .intro {
      width: min(760px, calc(100% - 36px));
      margin: 0 auto 14px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      color: #c9d1ff;
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    /* .eyebrow::before {
      width: 28px;
      height: 1px;
      content: "";
      background: currentColor;
      opacity: .7;
    } */

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 3.4rem);
      line-height: .98;
      letter-spacing: -.045em;
    }

    .subtitle {
      max-width: 620px;
      margin: 14px auto 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: clamp(.92rem, 2vw, 1.05rem);
    }

    .carousel {
      position: relative;
      width: 100%;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .carousel:focus-visible .stage {
      box-shadow: inset 0 0 0 2px rgba(147, 167, 255, .78);
    }

    .stage {
      position: relative;
      height: clamp(310px, 51vw, 490px);
      overflow: hidden;
      perspective: 1150px;
      perspective-origin: 50% 45%;
      transform-style: preserve-3d;
      touch-action: pan-y pinch-zoom;
      cursor: grab;
      mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
    }

    .stage.is-dragging { cursor: grabbing; }

    .stage::before {
      position: absolute;
      inset: 13% 8% 7%;
      content: "";
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(107, 126, 255, .17), transparent 66%);
      filter: blur(16px);
    }

    .card {
      --x: 0px;
      --y: 0px;
      --z: 0px;
      --ry: 0deg;
      --s: 1;
      --alpha: 1;
      --blur: 0px;
      --shadow-alpha: .38;
      --shadow-y: 34px;
      --shadow-blur: 60px;
      --sat: 1;
      position: absolute;
      top: 47%;
      left: 50%;
      width: var(--card-w);
      aspect-ratio: 3 / 4;
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: var(--radius);
      color: inherit;
      text-align: left;
      background: transparent;
      opacity: var(--alpha);
      filter: blur(var(--blur)) saturate(var(--sat));
      box-shadow:
        0 var(--shadow-y) var(--shadow-blur) rgba(0, 0, 0, var(--shadow-alpha)),
        inset 0 1px 0 rgba(255,255,255,.18);
      transform:
        translate(-50%, -50%)
        translate3d(var(--x), var(--y), var(--z))
        rotateY(var(--ry))
        scale(var(--s));
      transform-origin: center center;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, opacity, filter, box-shadow;
      transition:
        transform var(--card-motion-duration) var(--ease),
        opacity var(--card-opacity-duration) ease,
        filter var(--card-effect-duration) ease,
        box-shadow var(--card-shadow-duration) ease;
    }

    .stage.is-dragging .card { transition: none; }

    .card[aria-hidden="true"] { pointer-events: none; }

    .card__surface {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(14px, 2.4vw, 22px);
      background:
        linear-gradient(155deg, rgba(255,255,255,.22), transparent 38%),
        linear-gradient(145deg, var(--c1), var(--c2));
    }

    .card__surface::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
      background:
        radial-gradient(circle at 78% 18%, rgba(255,255,255,.25), transparent 28%),
        linear-gradient(to top, rgba(4, 7, 22, .74), transparent 58%);
    }

    .card__top,
    .card__bottom {
      position: relative;
      z-index: 1;
    }

    .card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .number {
      display: inline-grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 50%;
      color: white;
      background: rgba(5, 9, 26, .22);
      backdrop-filter: blur(10px);
      font-weight: 800;
      font-size: .78rem;
    }

    .tag {
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      color: rgba(255,255,255,.9);
      background: rgba(5, 9, 26, .2);
      backdrop-filter: blur(10px);
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .orb {
      position: absolute;
      z-index: 0;
      top: 23%;
      right: -11%;
      width: 74%;
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,.23);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.48), transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), rgba(4,7,22,.18) 64%);
      box-shadow: inset -24px -18px 46px rgba(0,0,0,.18), 0 20px 50px rgba(0,0,0,.12);
    }

    .card__bottom h2 {
      margin: 0 0 6px;
      font-size: clamp(1rem, 2.2vw, 1.42rem);
      letter-spacing: -.025em;
    }

    .card__bottom p {
      margin: 0;
      color: rgba(255,255,255,.76);
      font-size: clamp(.74rem, 1.4vw, .87rem);
      line-height: 1.45;
    }

    .card.is-active {
      border-color: rgba(255,255,255,.3);
    }

    .card.is-active .card__surface {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.09);
    }

    .controls {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(720px, calc(100% - 32px));
      margin: -16px auto 0;
    }

    .control {
      display: inline-grid;
      min-width: 44px;
      height: 44px;
      padding: 0 15px;
      place-items: center;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 999px;
      color: var(--text);
      background: rgba(19, 25, 50, .7);
      box-shadow: 0 12px 30px rgba(0,0,0,.24);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition:
        transform var(--control-transition-duration) ease,
        background var(--control-transition-duration) ease,
        border-color var(--control-transition-duration) ease;
    }

    .control:hover { transform: translateY(-2px); background: rgba(34, 43, 82, .82); }
    .control:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .control:active { transform: translateY(0) scale(.96); }
    .control:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .control[hidden] { display: none; }

    .counter {
      min-width: 82px;
      color: #d6dcf5;
      font-variant-numeric: tabular-nums;
      font-size: .84rem;
      text-align: center;
    }

    .hint {
      width: min(680px, calc(100% - 36px));
      margin: 16px auto 0;
      color: #8f99b9;
      text-align: center;
      font-size: .78rem;
      line-height: 1.45;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #signature {
      width: min(1180px, calc(100% - 36px));
      padding: 12px 0 max(22px, env(safe-area-inset-bottom));
      color: var(--signature-text);
      text-align: center;
    }

    #signature::before {
      display: block;
      width: min(280px, 72vw);
      height: 1px;
      margin: 0 auto 18px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(147, 167, 255, .28), transparent);
    }

    #signature p {
      display: inline-flex;
      margin: 0;
      padding: 5px 9px 6px;
      border: 1px solid var(--signature-border);
      border-radius: 6px;
      color: inherit;
      background: var(--signature-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04), 0 8px 24px rgba(0, 0, 0, .14);
      font-family: "Roboto Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: .76rem;
      font-style: normal;
      font-weight: 400;
      letter-spacing: -.015em;
      line-height: 1.4;
    }

    @media (max-width: 640px) {
      :root { --card-w: clamp(154px, 52vw, 196px); --radius: 20px; }
      .demo { padding-block: 26px; }
      .intro { margin-bottom: 2px; }
      .subtitle { max-width: 34rem; }
      .stage {
        height: clamp(300px, 100vw, 390px);
        perspective: 900px;
        mask-image: linear-gradient(90deg, transparent 0%, #000 4%, #000 96%, transparent 100%);
        -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 4%, #000 96%, transparent 100%);
      }
      .card { top: 49%; }
      .controls { margin-top: -10px; }
      .hint { margin-top: 13px; }
      #signature { padding-top: 6px; }
      #signature::before { margin-bottom: 15px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .control { transition-duration: 1ms !important; }
    }
  </style>
</head>
<body>
  <main class="demo">
    <header class="intro">
      <p class="eyebrow">Demonstração interativa</p>
      <h1>Carrossel 3D</h1>
      <p class="subtitle">Arraste, deslize, use as setas do teclado ou os controles.</p>
    </header>

    <section
      class="carousel"
      id="carousel"
      tabindex="0"
      role="region"
      aria-roledescription="carrossel"
      aria-label="Carrossel 3D de exemplos"
    >
      <div class="stage" id="stage"></div>

      <div class="controls" aria-label="Controles do carrossel">
        <button class="control" id="prev" type="button" aria-label="Card anterior">←</button>
        <span class="counter" id="counter" aria-live="polite">01 / 13</span>
        <button class="control" id="next" type="button" aria-label="Próximo card">→</button>
        <button class="control" id="play" type="button" aria-label="Pausar rotação automática">Pausar</button>
      </div>

      <!-- <p class="hint">No celular, deslize horizontalmente. O gesto vertical da página continua disponível.</p> -->
      <p class="sr-only" id="status" aria-live="polite"></p>
    </section>
  </main>

  <footer id="signature" aria-label="Créditos">
    <p>&lt;/Developed by Brenon&gt;</p>
  </footer>

  <script>
    (() => {
      /* Configurações principais do componente. Tempos são informados em milissegundos. */
      const CONFIG = Object.freeze({
        animation: Object.freeze({
          cardMovement: 720,
          cardOpacity: 520,
          cardEffects: 520,
          cardShadow: 650,
          controls: 180
        }),
        autoplay: Object.freeze({
          enabled: true,                 // false remove toda a funcionalidade de autoplay
          startsPlaying: true,           // false abre a página com o carrossel pausado
          showButton: true,              // false oculta somente o botão Pausar/Reproduzir
          interval: 2000,                // intervalo entre as trocas automáticas
          resumeAfterInteraction: 5200,  // espera antes de retomar após arrastar/clicar
          pauseOnHover: false            // pausa enquanto o ponteiro estiver sobre o carrossel
        })
      });

      const items = [
        ["Horizonte", "Exploração", "#5c6cff", "#273080"],
        ["Órbita", "Tecnologia", "#7b52e8", "#342263"],
        ["Pulso", "Inovação", "#d64c8e", "#63213f"],
        ["Aurora", "Criatividade", "#f07853", "#7a3023"],
        ["Núcleo", "Estratégia", "#efa83d", "#704119"],
        ["Fluxo", "Processos", "#5bbf7e", "#24583a"],
        ["Prisma", "Design", "#28bfc7", "#15555e"],
        ["Vértice", "Dados", "#2695dc", "#17466b"],
        ["Atlas", "Pesquisa", "#4f73df", "#243a79"],
        ["Eclipse", "Produto", "#7158c9", "#352568"],
        ["Vínculo", "Pessoas", "#b950b3", "#5b2658"],
        ["Impulso", "Crescimento", "#e15b73", "#6d2938"],
        ["Síntese", "Resultado", "#bd7445", "#623b23"]
      ];

      const stage = document.querySelector("#stage");
      const carousel = document.querySelector("#carousel");
      const prevButton = document.querySelector("#prev");
      const nextButton = document.querySelector("#next");
      const playButton = document.querySelector("#play");
      const counter = document.querySelector("#counter");
      const status = document.querySelector("#status");
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      const animationProperties = {
        cardMovement: "--card-motion-duration",
        cardOpacity: "--card-opacity-duration",
        cardEffects: "--card-effect-duration",
        cardShadow: "--card-shadow-duration",
        controls: "--control-transition-duration"
      };

      Object.entries(animationProperties).forEach(([key, property]) => {
        document.documentElement.style.setProperty(property, `${CONFIG.animation[key]}ms`);
      });

      playButton.hidden = !CONFIG.autoplay.showButton;

      let position = 0;
      let pointerStartX = 0;
      let pointerStartPosition = 0;
      let dragging = false;
      let autoplay = CONFIG.autoplay.enabled && CONFIG.autoplay.startsPlaying && !reducedMotion.matches;
      let autoplayTimer = null;
      let resumeTimer = null;
      let raf = 0;
      let suppressClick = false;

      const mod = (value, length) => ((value % length) + length) % length;
      const activeIndex = () => mod(Math.round(position), items.length);

      const cards = items.map(([title, tag, c1, c2], index) => {
        const card = document.createElement("button");
        card.className = "card";
        card.type = "button";
        card.dataset.index = index;
        card.style.setProperty("--c1", c1);
        card.style.setProperty("--c2", c2);
        card.setAttribute("aria-label", `${title}, card ${index + 1} de ${items.length}`);
        card.innerHTML = `
          <span class="card__surface">
            <span class="card__top">
              <span class="number">${String(index + 1).padStart(2, "0")}</span>
              <span class="tag">${tag}</span>
            </span>
            <span class="orb" aria-hidden="true"></span>
            <span class="card__bottom">
              <h2>${title}</h2>
            </span>
          </span>`;
        card.addEventListener("click", (event) => {
          if (suppressClick) {
            event.preventDefault();
            suppressClick = false;
            return;
          }
          centerCard(index);
        });
        stage.appendChild(card);
        return card;
      });

      function getSpacing() {
        const width = window.innerWidth;
        if (width <= 420) return Math.max(98, width * 0.31);
        if (width <= 700) return Math.max(118, width * 0.27);
        return Math.min(182, Math.max(142, width * 0.145));
      }

      function circularDelta(index) {
        const count = items.length;
        let delta = mod(index - position + count / 2, count) - count / 2;
        if (delta < -count / 2) delta += count;
        return delta;
      }

      function render(announce = false) {
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          const spacing = getSpacing();
          const viewport = stage.clientWidth;
          const mobile = viewport < 640;

          cards.forEach((card, index) => {
            const delta = circularDelta(index);
            const abs = Math.abs(delta);
            const sign = Math.sign(delta);

            const x = delta * spacing;
            const y = Math.pow(abs, 1.42) * (mobile ? 7 : 9);
            const z = 150 - abs * (mobile ? 96 : 112);
            const rotate = -sign * Math.min(63, abs * (mobile ? 25 : 22));
            const scale = Math.max(mobile ? .62 : .56, 1.08 - abs * (mobile ? .145 : .125));
            const edgeDistance = Math.max(0, Math.abs(x) - viewport * .31);
            const edgeFade = Math.min(1, edgeDistance / Math.max(1, viewport * .25));
            const alpha = abs > 4.8 ? 0 : Math.max(0, 1 - Math.max(0, abs - 2.45) * .30 - edgeFade * .68);
            const blur = abs > 2.3 ? Math.min(2.2, (abs - 2.3) * .85) : 0;
            const isActive = abs < .5;

            card.style.setProperty("--x", `${x}px`);
            card.style.setProperty("--y", `${y}px`);
            card.style.setProperty("--z", `${z}px`);
            card.style.setProperty("--ry", `${rotate}deg`);
            card.style.setProperty("--s", scale.toFixed(3));
            card.style.setProperty("--alpha", alpha.toFixed(3));
            card.style.setProperty("--blur", `${blur.toFixed(2)}px`);
            card.style.setProperty("--shadow-alpha", (isActive ? .54 : Math.max(.12, .34 - abs * .055)).toFixed(3));
            card.style.setProperty("--shadow-y", `${Math.round(10 + 25 * scale)}px`);
            card.style.setProperty("--shadow-blur", `${Math.round(22 + 38 * scale)}px`);
            card.style.setProperty("--sat", (0.8 + scale * 0.2).toFixed(3));
            card.style.zIndex = String(100 - Math.round(abs * 10));
            card.classList.toggle("is-active", isActive);
            card.setAttribute("aria-current", isActive ? "true" : "false");
            card.setAttribute("aria-hidden", alpha < .06 ? "true" : "false");
            card.tabIndex = isActive ? 0 : -1;
          });

          const index = activeIndex();
          counter.textContent = `${String(index + 1).padStart(2, "0")} / ${items.length}`;
          if (announce) status.textContent = `${items[index][0]}, card ${index + 1} de ${items.length}`;
        });
      }

      function normalizeNear(value, targetIndex) {
        const count = items.length;
        const base = Math.round(value / count) * count + targetIndex;
        const options = [base - count, base, base + count];
        return options.reduce((best, candidate) =>
          Math.abs(candidate - value) < Math.abs(best - value) ? candidate : best
        );
      }

      function centerCard(index) {
        position = normalizeNear(position, index);
        render(true);
        postponeAutoplay();
      }

      function move(step, announce = true, userInitiated = true) {
        position = Math.round(position) + step;
        render(announce);
        if (userInitiated) postponeAutoplay();
      }

      function setAutoplay(value) {
        const unavailable = !CONFIG.autoplay.enabled || reducedMotion.matches;
        autoplay = Boolean(value && !unavailable);

        playButton.disabled = unavailable;
        if (!CONFIG.autoplay.enabled) {
          playButton.textContent = "Autoplay desativado";
          playButton.setAttribute("aria-label", "Rotação automática desativada");
        } else if (reducedMotion.matches) {
          playButton.textContent = "Movimento reduzido";
          playButton.setAttribute("aria-label", "Rotação automática desativada pela preferência de movimento reduzido");
        } else {
          playButton.textContent = autoplay ? "Pausar" : "Reproduzir";
          playButton.setAttribute("aria-label", autoplay ? "Pausar rotação automática" : "Iniciar rotação automática");
        }

        clearInterval(autoplayTimer);
        autoplayTimer = null;
        if (autoplay) {
          autoplayTimer = setInterval(() => move(1, false, false), CONFIG.autoplay.interval);
        }
      }

      function postponeAutoplay() {
        clearTimeout(resumeTimer);
        if (!autoplay) return;
        clearInterval(autoplayTimer);
        autoplayTimer = null;
        resumeTimer = setTimeout(() => setAutoplay(true), CONFIG.autoplay.resumeAfterInteraction);
      }

      function onPointerDown(event) {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        dragging = true;
        suppressClick = false;
        pointerStartX = event.clientX;
        pointerStartPosition = position;
        stage.classList.add("is-dragging");
        stage.setPointerCapture(event.pointerId);
        postponeAutoplay();
      }

      function onPointerMove(event) {
        if (!dragging) return;
        const dx = event.clientX - pointerStartX;
        if (Math.abs(dx) > 6) suppressClick = true;
        position = pointerStartPosition - dx / getSpacing();
        render(false);
      }

      function onPointerUp(event) {
        if (!dragging) return;
        dragging = false;
        stage.classList.remove("is-dragging");
        if (stage.hasPointerCapture(event.pointerId)) stage.releasePointerCapture(event.pointerId);
        position = Math.round(position);
        render(true);
      }

      stage.addEventListener("pointerdown", onPointerDown);
      stage.addEventListener("pointermove", onPointerMove);
      stage.addEventListener("pointerup", onPointerUp);
      stage.addEventListener("pointercancel", onPointerUp);

      stage.addEventListener("wheel", (event) => {
        if (Math.abs(event.deltaX) <= Math.abs(event.deltaY) && !event.shiftKey) return;
        event.preventDefault();
        move(event.deltaX + event.deltaY > 0 ? 1 : -1);
      }, { passive: false });

      prevButton.addEventListener("click", () => move(-1));
      nextButton.addEventListener("click", () => move(1));
      playButton.addEventListener("click", () => setAutoplay(!autoplay));

      carousel.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") { event.preventDefault(); move(-1); }
        if (event.key === "ArrowRight") { event.preventDefault(); move(1); }
        if (event.key === "Home") { event.preventDefault(); centerCard(0); }
        if (event.key === "End") { event.preventDefault(); centerCard(items.length - 1); }
        if (event.key === " ") { event.preventDefault(); setAutoplay(!autoplay); }
      });

      carousel.addEventListener("mouseenter", () => {
        if (CONFIG.autoplay.pauseOnHover && autoplay) clearInterval(autoplayTimer);
      });

      carousel.addEventListener("mouseleave", () => {
        if (CONFIG.autoplay.pauseOnHover && autoplay && !dragging) setAutoplay(true);
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) clearInterval(autoplayTimer);
        else if (autoplay) setAutoplay(true);
      });

      reducedMotion.addEventListener?.("change", (event) => {
        if (event.matches) setAutoplay(false);
        else setAutoplay(CONFIG.autoplay.startsPlaying);
      });

      window.addEventListener("resize", () => render(false), { passive: true });

      render(false);
      setAutoplay(autoplay);
    })();
  </script>
</body>
</html>
